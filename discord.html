<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* === General Reset & Fonts === */
* { box-sizing: border-box; margin:0; padding:0; }
body, html {
    height: 100%;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #2f3136, #202225);
    color: #fff;
}

/* === Profile Card === */
.profile-card {
    width: 420px;
    padding: 36px 32px;
    border-radius: 16px;
    background: rgba(32,34,37,0.85);
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* === Header === */
.profile-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
}

.profile-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 12px;
    border: 4px solid #2f3136;
    transition: 0.3s all;
}

.profile-avatar:hover {
    transform: scale(1.05);
    border-color: #5865F2;
}

.profile-info h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
}

.profile-info p {
    font-size: 14px;
    color: #b9bbbe;
}

/* === Sections === */
.section {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.section input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    background-color: #1f2024;
    color: #dcddde;
    font-size: 14px;
    transition: 0.2s all;
}

.section input[type="text"]:focus {
    outline: none;
    box-shadow: 0 0 0 2px #5865F2;
    background-color: #2a2b30;
}

.section button {
    padding: 12px 0;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg,#5865F2,#4752C4);
    transition: 0.2s all;
}

.section button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    background: linear-gradient(135deg,#4752C4,#3b3f57);
}

/* Danger Button */
.section button.danger {
    background: #ed4245;
}

.section button.danger:hover {
    background: #d03438;
}

/* Hide file input */
#profilePicInput {
    display: none;
}

/* === Popups === */
.popup-overlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100vw;
    height:100vh;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.popup-content {
    background: rgba(32,34,37,0.95);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    max-width: 300px;
    position: relative;
    animation: slideDown 0.4s ease;
}

.popup-content img {
    width: 50px;
    height: 50px;
}

.popup-content span {
    color: #b9bbbe;
    margin-top: 12px;
    display: block;
    font-size: 14px;
}

.popup-close {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 20px;
    font-weight: 700;
    color: #b9bbbe;
    cursor: pointer;
}

.popup-close:hover { color: #fff; }

/* === Animations === */
@keyframes fadeIn {
    from { opacity:0; transform: translateY(-20px);}
    to { opacity:1; transform: translateY(0);}
}

@keyframes slideDown {
    from { opacity:0; transform: translateY(-20px);}
    to { opacity:1; transform: translateY(0);}
}

/* === Username + Badges Row === */
.username-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}

/* Username text */
#username {
    display: inline-block;
}

/* === Badges Container === */
.badges {
    display: inline-flex;
    align-items: center;
    gap: 2px;

    /* must NOT be fixed size */
    width: auto;
    height: auto;
}

/* === Individual Badge Icons === */
.badges img {
    width: 30px;          /* your chosen size */
    height: 30px;
    object-fit: contain;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.badges img:hover {
    transform: translateY(-1px);
    filter: brightness(1.15);
}

</style>
</head>
<body>

<div class="profile-card">
  <div class="profile-header">
    <img id="profilePic" class="profile-avatar" src="" alt="Profile Picture" />
    <div class="profile-info">
      <h2 id="displayName">Display Name</h2>
      <div class="username-row">
        <span id="username">User#0000</span>
        <div id="allBadges" class="badges"></div>
      </div>
      <p>Joined: <span id="joinDate"></span></p>
    </div>
  </div>

  <div class="section">
    <input type="text" id="newUsername" placeholder="Change Username">
    <input type="text" id="newDisplayName" placeholder="Change Display Name">
    <button onclick="saveProfile()">Save Changes</button>
    <button onclick="changeProfilePic()">Change Profile Picture</button>
    <input type="file" id="profilePicInput" onchange="uploadProfilePic(event)">
    <button onclick="subscribeToNitro()">Subscribe to Nitro</button>
    <button onclick="developStuff()">Become a Developer</button>
    <button onclick="loadHSBadge()">Take the Hypesquad Quiz</button>
    <button onclick="boostServer()">Boost a discord server</button>
    <button onclick="unsubscribeNitro()">Unsubscribe to Nitro</button>
    <button onclick="ableLegacy()">En/Dis able Legacy Username Badge</button>
    <button onclick="resetAccountData()" class="danger">Log Out</button>
  </div>
</div>

<!-- Nitro Popup -->
<div id="popupOverlay" class="popup-overlay" onclick="closePopup(event)">
  <div class="popup-content" onclick="event.stopPropagation()">
    <div class="popup-close" onclick="closePopup(event)">×</div>
    <img id="popupImage" src="" alt="Nitro Icon" />
    <span id="popupText">Nitro Info Here</span>
  </div>
</div>

<!-- Developer Popup -->
<div id="devPopupOverlay" class="popup-overlay" onclick="closeDevPopup(event)">
  <div class="popup-content" onclick="event.stopPropagation()">
    <div class="popup-close" onclick="closeDevPopup(event)">×</div>
    <img id="devPopupImage" src="" alt="Dev Icon" />
    <span id="devPopupText">Developer Info Here</span>
  </div>
</div>

<script>
// === Data & Constants ===
const takenUsernames = ["discord"];

const nitroIcons = {
  OPAL: "https://cdn.discordapp.com/badge-icons/5b154df19c53dce2af92c9b61e6be5e2.png",
  RUBY: "https://cdn.discordapp.com/badge-icons/cd5e2cfd9d7f27a8cdcd3e8a8d5dc9f4.png",
  EMERALD: "https://cdn.discordapp.com/badge-icons/11e2d339068b55d3a506cff34d3780f3.png",
  DIAMOND: "https://cdn.discordapp.com/badge-icons/0d61871f72bb9a33a7ae568c1fb4f20a.png",
  PLATINUM: "https://cdn.discordapp.com/badge-icons/0334688279c8359120922938dcb1d6f8.png",
  GOLD: "https://cdn.discordapp.com/badge-icons/2895086c18d5531d499862e41d1155a6.png",
  SILVER: "https://cdn.discordapp.com/badge-icons/4514fab914bdbfb4ad2fa23df76121a6.png",
  BRONZE: "https://cdn.discordapp.com/badge-icons/4f33c4a9c64ce221936bd256c356f91f.png",
  ORIGINAL: "https://cdn.discordapp.com/badge-icons/2ba85e8026a8614b640c2837bcdfe21b.png"
};

const boostIcons = {
  0:  "https://cdn.discordapp.com/badge-icons/51040c70d4f20a921ad6674ff86fc95c.png",
  2:  "https://cdn.discordapp.com/badge-icons/0e4080d1d333bc7ad29ef6528b6f2fb7.png",
  3:  "https://cdn.discordapp.com/badge-icons/72bed924410c304dbe3d00a6e593ff59.png",
  6:  "https://cdn.discordapp.com/badge-icons/df199d2050d3ed4ebf84d64ae83989f8.png",
  9:  "https://cdn.discordapp.com/badge-icons/996b3e870e8a22ce519b3a50e6bdd52f.png",
  12: "https://cdn.discordapp.com/badge-icons/991c9f39ee33d7537d9f408c3e53141e.png",
  15: "https://cdn.discordapp.com/badge-icons/cb3ae83c15e970e8f3d410bc62cb8b99.png",
  18: "https://cdn.discordapp.com/badge-icons/7142225d31238f6387d9f09efaa02759.png",
  24: "https://cdn.discordapp.com/badge-icons/ec92202290b48d0879b7413d2dde3bab.png"
};

const devIcons = {
  EARLY: "https://cdn.discordapp.com/badge-icons/6df5892e0f35b051f8b61eace34f4967.png",
  ACTIVE: "https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png"
};

const hypesquadIcons = {
  BRAVERY: "https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png",
  BRILLANCE: "https://cdn.discordapp.com/badge-icons/011940fd013da3f7fb926e4a1cd2e618.png",
  BALANCE: "https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png"
};

const extracurricularIcons = {
  EARLY_SUPPORTER: "https://cdn.discordapp.com/badge-icons/7060786766c9c840eb3019e725d2b358.png",
  COMPLETED_QUEST: "https://cdn.discordapp.com/badge-icons/7d9ae358c8c5e118768335dbe68b4fb8.png",
  LEGACY_USERNAME: "https://cdn.discordapp.com/badge-icons/6de6d34650760ba5551a79732e98ed60.png",
  PARTNER_BADGE: "https://cdn.discordapp.com/badge-icons/3f9748e53446a137a052f3454e2de41e.png"
};

// Default profile picture
let defaultPFP = `https://cdn.discordapp.com/embed/avatars/${Math.floor(Math.random() * 6)}.png`;

// === Utilities ===
function generateRandomDate(start, end){
    const startMs = start.getTime();
    const endMs = end.getTime();
    const randomMs = startMs + Math.random() * (endMs - startMs);
    return new Date(randomMs);
}

function getNitroTier(months){
    if(months >= 72) return "OPAL";
    if(months >= 60) return "RUBY";
    if(months >= 36) return "EMERALD";
    if(months >= 24) return "DIAMOND";
    if(months >= 12) return "PLATINUM";
    if(months >= 6) return "GOLD";
    if(months >= 3) return "SILVER";
    if(months >= 1) return "BRONZE";
    return "ORIGINAL";
}

function getBoostTier(months){
    const thresholds = [24,18,15,12,9,6,3,2,0];
    for (const m of thresholds){
        if (months >= m) return boostIcons[m];
    }
    return null;
}

// === Load Profile ===
let username = localStorage.getItem('newUsername') || "User#0000";
let joinDateStr = localStorage.getItem('joinDate');
let joinDateObj = joinDateStr ? new Date(joinDateStr) : new Date("2015-05-13");

if(!joinDateStr){
    localStorage.setItem('joinDate', joinDateObj.toISOString());
}

document.getElementById('username').textContent = username;
document.getElementById('displayName').textContent = username.split('#')[0];
document.getElementById('joinDate').textContent = `${joinDateObj.getMonth()+1}/${joinDateObj.getDate()}/${joinDateObj.getFullYear()}`;
document.getElementById('profilePic').src = defaultPFP;

// === Profile Functions ===
function saveProfile(){
    const newUsernameInput = document.getElementById('newUsername').value.trim();
    const newDisplayNameInput = document.getElementById('newDisplayName').value.trim();
    const newUsername = newUsernameInput || username;
    const newDisplayName = newDisplayNameInput || newUsername.split('#')[0];

    if(takenUsernames.includes(newUsername.toLowerCase())){
        alert("Username already taken!");
        return;
    }

    username = newUsername;
    document.getElementById('username').textContent = newUsername;
    document.getElementById('displayName').textContent = newDisplayName;
    localStorage.setItem('newUsername', newUsername);
    alert("Profile saved!");
}

function changeProfilePic(){
    document.getElementById('profilePicInput').click();
}

function uploadProfilePic(event){
    const file = event.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = e=>{
            profilePic = e.target.result;
            document.getElementById('profilePic').src = profilePic;
            localStorage.setItem('profilePic', profilePic);
        };
        reader.readAsDataURL(file);
    }
}

function resetAccountData(){
    localStorage.clear();
    alert("Logged out!");
    window.location.href="login.html";
}

// === Badges Helper ===
function clearAllBadges(){
    document.getElementById("allBadges").innerHTML = "";
}

function addBadge(src, title, onClick=null, id=null){
    const badge = document.createElement("img");
    badge.src = src;
    badge.title = title;
    badge.className = "badges";
    if(onClick) badge.onclick = onClick;
    if(id) badge.id = id;
    document.getElementById("allBadges").appendChild(badge);
}

// === Nitro ===
let currentSubscription = null;

function subscribeToNitro(){
    if (currentSubscription) {
        alert("You already have Nitro!");
        return;
    }

    const today = new Date();
    const subscriptionDate = generateRandomDate(joinDateObj, today);

    localStorage.setItem('firstNitroDate', subscriptionDate.toISOString());

    const monthsSubscribed = Math.floor((today - subscriptionDate) / (1000*60*60*24*30.4375));
    const tier = getNitroTier(monthsSubscribed);

    const earlySupporterCutoff = new Date("2018-10-10");
    const hasEarlySupporter = subscriptionDate < earlySupporterCutoff;

    currentSubscription = {
        tier,
        icon: nitroIcons[tier],
        date: `${subscriptionDate.getMonth()+1}/${subscriptionDate.getDate()}/${subscriptionDate.getFullYear()}`,
        earlySupporter: hasEarlySupporter
    };

    localStorage.setItem('nitroTier', tier);
    localStorage.setItem('nitroSubscriptionDate', subscriptionDate.toISOString());
    localStorage.setItem('earlySupporter', hasEarlySupporter);

    loadAllBadges();
}

// Toggle Legacy Username badge manually
// Toggle Legacy Username Badge
// Toggle Legacy Username Badge
function ableLegacy() {
    const allBadgesContainer = document.getElementById("allBadges");
    const badgeId = "legacyBadge"; // fixed ID
    const current = localStorage.getItem("legacyBadgeEnabled") === "true";
    const newState = !current;

    localStorage.setItem("legacyBadgeEnabled", newState);

    const joinDateStr = localStorage.getItem("joinDate");
    const joinDate = joinDateStr ? new Date(joinDateStr) : new Date();
    const firstChange = localStorage.getItem("newUsername") !== null; // changed username at least once
    const eligibilityDate = new Date("2023-06-15");
    const isEligible = firstChange && joinDate < eligibilityDate;

    // Always remove existing legacy badge first
    const existingBadge = document.getElementById(badgeId);
    if (existingBadge) allBadgesContainer.removeChild(existingBadge);

    // Add badge if enabled AND eligible
    if (newState && isEligible) {
        addBadge(
            extracurricularIcons.LEGACY_USERNAME,
            "Legacy Username",
            null,
            badgeId
        );
        alert("Legacy Username badge enabled.");
    } else {
        alert("Legacy Username badge disabled or not eligible.");
    }
}

function developStuff() {
    if (localStorage.getItem("developerType")) {
        alert("You are already a developer.");
        return;
    }

    const joinDateStr = localStorage.getItem("joinDate");
    const joinDate = joinDateStr ? new Date(joinDateStr) : new Date();

    const earlyDevCutoff = new Date("2020-08-19"); // accounts after this cannot get EARLY

    let devType;
    if (joinDate < earlyDevCutoff) {
        // 20% chance EARLY, 80% ACTIVE
        devType = Math.random() < 0.2 ? "EARLY" : "ACTIVE";
    } else {
        // Accounts after 8/19/2020 can only get ACTIVE
        devType = "ACTIVE";
    }

    localStorage.setItem("developerType", devType);
    loadAllBadges();

    alert(
        devType === "EARLY"
            ? "You became an Early Developer!"
            : "You became an Active Developer!"
    );
}

function loadHSBadge(){
    const hsDisc = new Date("2025-09-16");

    if (joinDateObj >= hsDisc) {
        alert("Your account is not eligible for HypeSquad.");
        return;
    }

    if (localStorage.getItem("hypesquadHouse")) {
        alert("You already completed the HypeSquad quiz.");
        return;
    }

    const houses = Object.keys(hypesquadIcons);
    const house = houses[Math.floor(Math.random() * houses.length)];

    localStorage.setItem("hypesquadHouse", house);
    loadAllBadges();

    alert(`You joined HypeSquad ${house}!`);
}

function boostServer() {
    if (!currentSubscription) {
        alert("You need Nitro to boost a server.");
        return;
    }

    if (localStorage.getItem('boostStartDate')) {
        alert("You are already boosting a server.");
        return;
    }

    const nitroDateStr = localStorage.getItem('nitroSubscriptionDate');
    const nitroStartDate = nitroDateStr ? new Date(nitroDateStr) : new Date();
    const today = new Date();

    // Generate a random date between Nitro subscription date and today
    const boostStartDate = generateRandomDate(nitroStartDate, today);

    localStorage.setItem('boostStartDate', boostStartDate.toISOString());
    loadAllBadges();

    alert(`Server boost started on ${boostStartDate.getMonth() + 1}/${boostStartDate.getDate()}/${boostStartDate.getFullYear()}`);
}

// === Auto Partner Badge (1 in 100 chance per login) ===
function maybeAssignPartnerBadge() {
    // Only assign if user doesn't already have it
    if (localStorage.getItem("partner") === "true") return;

    const roll = Math.floor(Math.random() * 100); // 0-99
    if (roll === 0) {
        localStorage.setItem("partner", "true");
        loadAllBadges();
        alert("🎉 You just got the Partner badge!");
    }
}

function unsubscribeNitro(){
    if (!currentSubscription) {
        alert("You don’t have Nitro.");
        return;
    }

    const roll = Math.floor(Math.random() * 3) + 1;

    // Remove Nitro
    currentSubscription = null;
    localStorage.removeItem('nitroTier');
    localStorage.removeItem('nitroSubscriptionDate');

    alert("Unsubscribing to nitro.")

    loadAllBadges();

    if (roll === 1) {
        alert("You commonly use nitro's boosts, this is also going to expire")
    setTimeout(() => {
        localStorage.removeItem('boostStartDate');
        loadAllBadges();
    }, 10000);
}
}

// === Load All Badges ===
function loadAllBadges(){
    clearAllBadges();

    /* ===== Nitro ===== */
    if (currentSubscription) {
        addBadge(
            currentSubscription.icon,
            `${currentSubscription.tier} Nitro`,
            () => showPopup()
        );

        if (currentSubscription.earlySupporter) {
            addBadge(
                extracurricularIcons.EARLY_SUPPORTER,
                "Early Supporter"
            );
        }
    }

    /* ===== Server Boost ===== */
    const boostDateStr = localStorage.getItem("boostStartDate");
    if (boostDateStr) {
        const boostStartDate = new Date(boostDateStr);
        const today = new Date();
        const boostMonths = Math.floor(
            (today - boostStartDate) / (1000 * 60 * 60 * 24 * 30.4375)
        );
        const boostIcon = getBoostTier(boostMonths);

        if (boostIcon) {
            addBadge(
                boostIcon,
                `Server Boosting since ${boostMonths} month${boostMonths === 1 ? "" : "s"}`
            );
        }
    }

    /* ===== HypeSquad (manual + eligibility gated) ===== */
    const hsDisc = new Date("2025-09-16");
    const house = localStorage.getItem("hypesquadHouse");

    if (house && joinDateObj < hsDisc) {
        addBadge(
            hypesquadIcons[house],
            `HypeSquad ${house.charAt(0) + house.slice(1).toLowerCase()}`
        );
    }

    /* ===== Developer (manual only) ===== */
    const devType = localStorage.getItem("developerType");
    if (devType) {
        addBadge(
            devIcons[devType],
            devType === "EARLY" ? "Early Developer" : "Active Developer",
            () => showDevPopup(devType)
        );
    }

    /* ===== Partner (RNG, auto, rare) ===== */
    if (localStorage.getItem("partner") === "true") {
        addBadge(
            extracurricularIcons.PARTNER_BADGE,
            "Discord Partner"
        );
    }

    /* ===== Legacy Username Badge ===== */
    const legacyEnabled = localStorage.getItem("legacyBadgeEnabled") === "true";
    const joinDateStr = localStorage.getItem("joinDate");
    const joinDate = joinDateStr ? new Date(joinDateStr) : new Date();
    const firstChange = localStorage.getItem("newUsername") !== null;
    const eligibilityDate = new Date("2023-06-15");
    const isEligible = firstChange && joinDate < eligibilityDate;

    if (legacyEnabled && isEligible) {
        addBadge(
            extracurricularIcons.LEGACY_USERNAME,
            "Legacy Username",
            null,
            "legacyBadge"
        );
    }
}

// === Popup Functions ===
function showPopup(){
    if(!currentSubscription) return;
    document.getElementById("popupImage").src = currentSubscription.icon;
    document.getElementById("popupText").innerHTML = `${currentSubscription.tier} Nitro<br>Subscribed: ${currentSubscription.date}`;
    document.getElementById("popupOverlay").style.display="flex";
}

function closePopup(){ document.getElementById("popupOverlay").style.display="none"; }

function showDevPopup(type){
    const devImage = document.getElementById("devPopupImage");
    const devText = document.getElementById("devPopupText");
    if(type==="EARLY"){
        devImage.src = devIcons.EARLY;
        devText.innerHTML = "🌟 Early Developer";
    } else {
        devImage.src = devIcons.ACTIVE;
        devText.innerHTML = "👨‍💻 Active Developer";
    }
    document.getElementById("devPopupOverlay").style.display="flex";
}

function closeDevPopup(){ document.getElementById("devPopupOverlay").style.display="none"; }

// === Init ===
if(localStorage.getItem('nitroTier')){
    currentSubscription = {
        tier: localStorage.getItem('nitroTier'),
        icon: nitroIcons[localStorage.getItem('nitroTier')],
        date: localStorage.getItem('nitroSubscriptionDate'),
        earlySupporter: localStorage.getItem('earlySupporter')==='true'
    };
}
maybeAssignPartnerBadge();
loadAllBadges();

</script>


</body>
</html>
